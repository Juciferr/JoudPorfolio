name: Optimize Images

on:
  push:
    branches: [main]
    paths:
      - 'public/images/**'

permissions:
  contents: write

jobs:
  optimize:
    name: Convert & compress images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install image tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q webp jpegoptim optipng

      - name: Convert JPG/PNG to WebP
        run: |
          find public/images -type f \( -name "*.jpg" -o -name "*.jpeg" -o -name "*.png" \) | while read f; do
            out="${f%.*}.webp"
            if [ ! -f "$out" ]; then
              cwebp -q 85 "$f" -o "$out"
              echo "Converted: $f → $out"
            fi
          done

      - name: Compress existing WebP files
        run: |
          find public/images -name "*.webp" | while read f; do
            size_before=$(stat -c%s "$f")
            cwebp -q 82 "$f" -o "${f}.tmp" && mv "${f}.tmp" "$f"
            size_after=$(stat -c%s "$f")
            echo "Compressed: $f (${size_before} → ${size_after} bytes)"
          done

      - name: Commit optimized images
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-optimize images [skip ci]"
          file_pattern: "public/images/**"
